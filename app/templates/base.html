<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    {% block head %}{% endblock %}
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-slate-800 text-white shadow">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="/" class="text-xl font-bold tracking-tight">Flask Dashboard</a>
            <div class="flex gap-3">
                <a href="{{ export_xlsx_url }}"
                   class="bg-green-600 hover:bg-green-700 px-3 py-1 rounded text-sm font-medium">Export Excel</a>
                <a href="{{ export_csv_url }}"
                   class="bg-blue-600 hover:bg-blue-700 px-3 py-1 rounded text-sm font-medium">Export CSV</a>
            </div>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
